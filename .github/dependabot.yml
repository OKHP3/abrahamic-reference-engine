version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Chicago
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

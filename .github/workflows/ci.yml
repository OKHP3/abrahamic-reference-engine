name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js LTS
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
